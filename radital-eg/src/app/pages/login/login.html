<div class="page-wrapper">

  <div class="login-card">
    
    <div class="radital-header">
      <div class="brand-logo">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1>RADITAL</h1>
      <p>Radiologist & Hospital Interface</p>
    </div>

    <div class="form-group">
      <label for="employeeId">EMPLOYEE ID</label>
      <input
        id="employeeId"
        type="text"
        [ngModel]="employeeId"
        (ngModelChange)="onIdChange($event)"
        (blur)="idTouched = true"
        placeholder="e.g. RAD1234567"
        autocomplete="username"
        [class.input-error]="showIdError"
      />
      <div class="error-message" *ngIf="showIdError">
        ID must start with RAD or TEC followed by exactly 7 digits.
      </div>
    </div>

    <div class="form-group" [class.disabled-group]="!isIdValid">
      <label for="password">PASSWORD</label>
      <div class="password-wrapper">
        <input
          #passwordInput
          id="password"
          [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="password"
          autocomplete="current-password"
          [disabled]="!isIdValid"
          placeholder="Enter password..."
        />
        <button 
          class="toggle-password" 
          (click)="togglePassword()" 
          type="button" 
          aria-label="Toggle password visibility"
          [disabled]="!isIdValid">
          <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn-signin" [disabled]="!isFormValid" (click)="onSignIn()">SIGN IN</button>

    <a class="forgot-link" (click)="onForgotPassword()">Forgot Password?</a>

    <div class="divider">
      <span>NEW STAFF</span>
    </div>

    <button class="btn-request" (click)="onRequestAccess()">REQUEST SYSTEM ACCESS</button>
  </div>

  <div class="authorized-badge">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    </svg>
    <span>Authorized Medical Access Only</span>
  </div>

  <footer class="footer">
    <span>© 2026 RADITAL Systems. All rights reserved.</span>
    <nav>
      <a href="#">Privacy Policy</a>
      <a href="#">Terms of Service</a>
      <a href="#">Technical Support</a>
      <a href="#">HIPAA Compliance</a>
    </nav>
  </footer>

</div>
